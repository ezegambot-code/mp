<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CODM Invite</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#111);
    background-size:400% 400%;
    animation:bgMove 10s ease infinite;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    text-align:center;
    z-index:2;
    animation:zoomIn 1.5s ease;
}

h1{
    color:#00ffe7;
    font-size:3rem;
    text-shadow:0 0 10px #00ffe7,
                0 0 20px #00ffe7,
                0 0 40px cyan;
}

p{
    color:white;
    margin-top:20px;
    font-size:1.4rem;
}

.by{
    color:gold;
    font-size:1.8rem;
    margin-top:15px;
    animation:blink 1s infinite;
}

button{
    margin-top:35px;
    padding:15px 35px;
    font-size:18px;
    border:none;
    border-radius:40px;
    background:#00ffe7;
    color:black;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.1);
    box-shadow:0 0 20px cyan;
}

@keyframes blink{
    50%{
        opacity:.4;
    }
}

@keyframes zoomIn{
    from{
        transform:scale(.5);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

/* Floating particles */
.particle{
    position:absolute;
    width:8px;
    height:8px;
    border-radius:50%;
    background:rgba(0,255,255,.8);
    animation:float 8s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh) scale(0);
    }
    to{
        transform:translateY(-120vh) scale(1);
    }
}
</style>
</head>
<body>

<div class="container">
    <h1 id="typing"></h1>
    <p>🎮 Tara na, squad up!</p>
    <div class="by">By: Lexter</div>
    <button onclick="playSound()">🔥 Game!</button>
</div>

<script>
// Typing Effect
const text = "Laro tayo CODM mamayang 9 ❤️";
let i = 0;

function typing(){
    if(i < text.length){
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typing,100);
    }
}
typing();

// Floating Particles
for(let i=0;i<50;i++){
    let p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"vw";
    p.style.animationDuration=(5+Math.random()*5)+"s";
    p.style.animationDelay=Math.random()*5+"s";
    document.body.appendChild(p);
}

// Button Sound
function playSound(){
    const audio=new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
    audio.play();
    alert("See you at 9 PM! 🎮🔥");
}
</script>

</body>
</html>
